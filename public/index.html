<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembina Video Motivasi</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo">
                <img src="logo.png" alt="VideoBuilder Logo">
                <h1>Video<span>Builder</span></h1>
            </div>
            <p>Jana video motivasi premium dengan satu klik</p>
        </header>

        <div class="content">
            <div class="glass-panel form-section">
                <h2>Laras Video Anda</h2>
                <form id="videoForm">
                    <div class="input-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label for="motivationText" style="margin-bottom: 0;">Teks Motivasi</label>
                            <div class="ai-buttons" style="display: flex; gap: 8px;">
                                <button type="button" id="btnGenHikmah" class="btn-secondary btn-small" style="padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; cursor: pointer;">
                                    <i class="fa-solid fa-wand-magic-sparkles"></i> Hikmah AI
                                </button>
                                <button type="button" id="btnGenMarketing" class="btn-secondary btn-small" style="padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; cursor: pointer;">
                                    <i class="fa-solid fa-bullhorn"></i> Tips Digital AI
                                </button>
                            </div>
                        </div>
                        <textarea id="motivationText" rows="6" placeholder="Contoh:&#10;Kejayaan bukan milik mereka yang pandai.&#10;Kesabaran adalah kunci.&#10;Terus berusaha walaupun penat." required></textarea>
                    </div>

                    <div class="input-group">
                        <label for="voiceSelect">Pilihan Suara (AI)</label>
                        <select id="voiceSelect" required>
                            <option value="ms-MY-YasminNeural">Yasmin (Perempuan - Lembut & Tenang)</option>
                            <option value="ms-MY-OsmanNeural">Osman (Lelaki - Tegas & Intelek)</option>
                        </select>
                    </div>

                    <!-- Background video selection has been disabled because it is auto-generated randomly per scene now -->
                    <div class="input-group" style="display: none;">
                        <input type="radio" name="bgVideo" value="auto" checked>
                    </div>

                    <button type="submit" class="generate-btn" id="submitBtn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>Jana Video Sekarang</span>
                    </button>
                </form>
            </div>

            <div class="glass-panel result-section">
                <h2>Pratonton Video</h2>
                
                <div class="status-container" id="statusContainer">
                    <div class="idle-state">
                        <i class="fa-solid fa-film"></i>
                        <p>Video anda akan dipaparkan di sini</p>
                    </div>
                </div>

                <div class="video-container hidden" id="videoContainer">
                    <video id="resultVideo" controls width="100%">
                        <source src="" type="video/mp4">
                        Maaf, pelayar anda tidak menyokong main balik video.
                    </video>
                    
                    <div class="action-buttons">
                        <a href="#" id="downloadBtn" download class="btn-secondary" target="_blank">
                            <i class="fa-solid fa-download"></i> Muat Turun
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
